{% extends "base.html" %}
{% block content %}

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div class="card shadow-sm border-danger">
        <div class="card-body">
          <h3 class="mb-2 text-danger">Delete Ticket #{{ order.id }}?</h3>
          <p class="text-muted mb-4">
            This cannot be undone. If you delete this ticket, it will be removed permanently.
          </p>

          <div class="mb-3">
            <div class="fw-semibold">{{ order.issue_title }}</div>
            <div class="text-muted">Submitted {{ order.created_at|date:"M d, Y g:i A" }}</div>
          </div>

          <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
              <a href="{% url 'orders:order_detail' order.id %}" class="btn btn-outline-secondary">
                Cancel
              </a>
              <button type="submit" class="btn btn-danger">
                Yes, delete it
              </button>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock content %}
